name: Daily 30 Report

on:
  schedule:
    - cron: "23 23 * * 0-4"   # 코스피 브리핑 KST 08:23
    - cron: "0 13 * * 1-5"    # 미국 시장 브리핑 KST 22:00
  workflow_dispatch:
    inputs:
      briefing_type:
        description: "수동 실행할 브리핑 종류"
        required: true
        default: "kospi"
        type: choice
        options:
          - kospi
          - us

permissions:
  contents: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  WEB_BASE_URL: "https://bejewelled-toffee-87de55.netlify.app"
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

defaults:
  run:
    shell: bash

jobs:
  kospi-briefing:
    name: "📈 코스피 브리핑 (KST 08:23)"
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '23 23 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.briefing_type == 'kospi')

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Python 패키지 설치
        run: pip install -r requirements.txt

      - name: 🗓️ 한국 시장 휴장일 확인
        id: holiday
        run: |
          if python3 scripts/holiday_check.py --market kospi; then
            echo "open=true" >> "$GITHUB_OUTPUT"
          else
            echo "open=false" >> "$GITHUB_OUTPUT"
            echo "오늘은 한국 시장 휴장일 — 건너뜀"
          fi

      - name: 📊 시장 데이터 수집
        if: steps.holiday.outputs.open == 'true'
        run: |
          mkdir -p data web/briefings
          python3 scripts/fetch_data.py --type kospi

      - name: 📰 뉴스 요약 (Gemini Flash)
        if: steps.holiday.outputs.open == 'true'
        continue-on-error: true
        run: python3 scripts/fetch_news.py --type kospi

      - name: ✨ Claude 분석 생성 (Prompt Caching + JSON only)
        if: steps.holiday.outputs.open == 'true'
        run: python3 scripts/call_claude.py --type kospi

      - name: 📨 Telegram 전송
        if: steps.holiday.outputs.open == 'true'
        continue-on-error: true
        run: python3 scripts/send_telegram.py --type kospi

      - name: 🚀 HTML 커밋 & 푸시
        if: steps.holiday.outputs.open == 'true'
        run: |
          git config user.email "dailyb-bot@users.noreply.github.com"
          git config user.name "DailyB Bot"
          git add web/ data/
          git diff --staged --quiet || git commit -m "📊 코스피 브리핑: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push

  us-briefing:
    name: "🇺🇸 미국 브리핑 (KST 22:00)"
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.briefing_type == 'us')

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Python 패키지 설치
        run: pip install -r requirements.txt

      - name: 🗓️ 미국 시장 휴장일 확인
        id: holiday
        run: |
          if python3 scripts/holiday_check.py --market us; then
            echo "open=true" >> "$GITHUB_OUTPUT"
          else
            echo "open=false" >> "$GITHUB_OUTPUT"
            echo "오늘은 미국 시장 휴장일 — 건너뜀"
          fi

      - name: 📊 시장 데이터 수집
        if: steps.holiday.outputs.open == 'true'
        run: |
          mkdir -p data web/briefings
          python3 scripts/fetch_data.py --type us

      - name: 📰 뉴스 요약 (Gemini Flash)
        if: steps.holiday.outputs.open == 'true'
        continue-on-error: true
        run: python3 scripts/fetch_news.py --type us

      - name: ✨ Claude 분석 생성 (Prompt Caching + JSON only)
        if: steps.holiday.outputs.open == 'true'
        run: python3 scripts/call_claude.py --type us

      - name: 📨 Telegram 전송
        if: steps.holiday.outputs.open == 'true'
        continue-on-error: true
        run: python3 scripts/send_telegram.py --type us

      - name: 🚀 HTML 커밋 & 푸시
        if: steps.holiday.outputs.open == 'true'
        run: |
          git config user.email "dailyb-bot@users.noreply.github.com"
          git config user.name "DailyB Bot"
          git add web/ data/
          git diff --staged --quiet || git commit -m "🇺🇸 미국 브리핑: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
