  <text x="62" y="324" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="rgba(255,255,255,.6)">📉 코스피 시초가가 오늘 하락 압력을 받을 것 같아요. S&amp;P500이 -0.07%로 거의 보합이지만, EWY(한국 ETF)가 -1.54%</text>
