<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E03131"/>
      <stop offset="100%" stop-color="#FF6A6A"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Left candle (tall, full opacity) -->
  <rect x="7" y="11" width="5" height="13" rx="1.5" fill="white"/>
  <line x1="9.5" y1="6"  x2="9.5" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="9.5" y1="24" x2="9.5" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Right candle (shorter, semi-transparent) -->
  <rect x="20" y="8" width="5" height="10" rx="1.5" fill="white" fill-opacity=".55"/>
  <line x1="22.5" y1="5"  x2="22.5" y2="8"  stroke="white" stroke-opacity=".55" stroke-width="2" stroke-linecap="round"/>
  <line x1="22.5" y1="18" x2="22.5" y2="22" stroke="white" stroke-opacity=".55" stroke-width="2" stroke-linecap="round"/>
</svg>
