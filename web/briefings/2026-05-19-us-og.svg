  <circle cx="50" cy="320" r="3" fill="rgba(255,255,255,.3)"/>
  <text x="62" y="324" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="rgba(255,255,255,.6)">📉 오늘 미국 증시가 약하게 시작할 것 같아요. S&amp;P500 선물이 -0.44%, 나스닥 선물이 -0.78%로 프리마켓이 전반적으로 내려</text>
  <circle cx="50" cy="348" r="3" fill="rgba(255,255,255,.3)"/>
  <text x="62" y="352" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="rgba(255,255,255,.6)">🏦 채권 시장이 주식에 부담을 주고 있어요. 미국채 10년물이 4.623%(+2.8bp)로 1년 만에 최고치 수준까지 올라왔거든요. 금리</text>
  <circle cx="50" cy="376" r="3" fill="rgba(255,255,255,.3)"/>
  <text x="62" y="380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="rgba(255,255,255,.6)">💡 반도체 섹터에서 강한 매도세가 나오고 있어요. 메모리 반도체 ETF(DRAM)가 -3.48% 급락했고, MU(마이크론)은 -5.95%</text>
